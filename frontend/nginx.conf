server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # SSE endpoint for the chat assistant — explicit overrides so nginx
  # doesn't buffer the response (would defeat the whole point of streaming)
  # and doesn't kill the connection after the default 60s while llama3.2
  # is still loading on a cold start.
  location /api/v1/assistant/stream {
    proxy_pass http://backend:8080/api/v1/assistant/stream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Keep the SSE channel open long enough for the model to finish + flush.
    # Anything below ~3 minutes will visibly cut off cold-start replies.
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_cache off;
    proxy_set_header Connection '';
    proxy_read_timeout 5m;
    proxy_send_timeout 5m;
    chunked_transfer_encoding on;
  }

  # /api/v1/assistant/chat is a synchronous POST — same timeout bump,
  # less surgical because the response is small JSON we don't need to stream.
  location /api/v1/assistant/chat {
    proxy_pass http://backend:8080/api/v1/assistant/chat;
    proxy_set_header Host $host;
    proxy_read_timeout 5m;
    proxy_send_timeout 5m;
  }

  location /api/ {
    proxy_pass http://backend:8080/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Some uploads (CV parsing through Ollama, verification calls) take
    # longer than the default 60s — bump conservatively.
    proxy_read_timeout 180s;
    proxy_send_timeout 180s;
    client_max_body_size 25m;
  }

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;
}
